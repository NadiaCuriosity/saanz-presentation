<!DOCTYPE html>
<html>
<head>
    <title>Meeting Intelligence - Routed by Department</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; font-family: sans-serif; }
        svg { max-width: 95vw; height: auto; }
    </style>
</head>
<body>
    <svg id="visualization" width="1200" height="880" viewBox="0 0 1200 880" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Gradients -->
            <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#e0eeff;stop-opacity:1" />
                <stop offset="60%" style="stop-color:#f0f6ff;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="opsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="skiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="maintGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="hsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f2440;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#c7d8ed;stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#e8eff8;stop-opacity:0.3" />
            </linearGradient>

            <!-- Soft shadow -->
            <filter id="softShadow" x="-5%" y="-5%" width="115%" height="120%">
                <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e3a5f" flood-opacity="0.1"/>
            </filter>
            <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="120%">
                <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1e3a5f" flood-opacity="0.12"/>
            </filter>

            <style>
                @keyframes flowDown {
                    to { stroke-dashoffset: -20; }
                }
                .flow-line {
                    stroke-dasharray: 8, 6;
                    animation: flowDown 0.8s linear infinite;
                }
                @keyframes snowfall {
                    0% { transform: translateY(0); opacity: 0.7; }
                    100% { transform: translateY(880px); opacity: 0; }
                }
            </style>
        </defs>

        <!-- Background -->
        <rect width="1200" height="880" fill="url(#skyGrad)"/>

        <!-- Mountain silhouettes (background) -->
        <polygon points="0,200 150,80 280,160 400,60 520,140 600,90 700,150 820,50 950,130 1050,70 1200,180 1200,280 0,280" fill="url(#mountainGrad)"/>
        <polygon points="0,240 100,160 200,200 350,120 480,190 550,150 680,180 800,110 920,170 1050,130 1200,220 1200,300 0,300" fill="#dce6f0" opacity="0.35"/>

        <!-- Snowflakes (scattered, subtle) -->
        <circle cx="80" cy="60" r="2" fill="#b0c4de" opacity="0.4"/>
        <circle cx="200" cy="120" r="1.5" fill="#b0c4de" opacity="0.3"/>
        <circle cx="350" cy="45" r="2.5" fill="#b0c4de" opacity="0.35"/>
        <circle cx="520" cy="90" r="1.5" fill="#b0c4de" opacity="0.3"/>
        <circle cx="700" cy="55" r="2" fill="#b0c4de" opacity="0.4"/>
        <circle cx="850" cy="100" r="1.5" fill="#b0c4de" opacity="0.25"/>
        <circle cx="1000" cy="40" r="2" fill="#b0c4de" opacity="0.35"/>
        <circle cx="1100" cy="85" r="1.5" fill="#b0c4de" opacity="0.3"/>
        <circle cx="150" cy="180" r="1" fill="#b0c4de" opacity="0.3"/>
        <circle cx="450" cy="160" r="1.5" fill="#b0c4de" opacity="0.25"/>
        <circle cx="780" cy="170" r="1" fill="#b0c4de" opacity="0.3"/>
        <circle cx="1050" cy="150" r="1.5" fill="#b0c4de" opacity="0.25"/>

        <!-- Title -->
        <text x="600" y="42" text-anchor="middle" fill="#0f2440" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700">Same Meeting. Different Outputs. Automatically Routed.</text>

        <!-- ============ SOURCE: Meeting ============ -->
        <rect x="440" y="70" width="320" height="70" rx="10" fill="url(#sourceGrad)" filter="url(#softShadow)"/>
        <text x="480" y="102" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="18">🎙</text>
        <text x="510" y="100" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">Management Meeting</text>
        <text x="510" y="120" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="11">Safety debrief · Team briefing · Planning</text>

        <!-- ============ STEP LABELS (the logic) ============ -->

        <!-- Step 1 label -->
        <rect x="80" y="82" width="120" height="24" rx="12" fill="#2563eb" opacity="0.1"/>
        <text x="140" y="99" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">1 · Record</text>

        <!-- Flow: Source to Transcribe -->
        <line x1="600" y1="140" x2="600" y2="175" stroke="#2563eb" stroke-width="2" class="flow-line"/>

        <!-- Step 2: Transcribe -->
        <rect x="430" y="175" width="340" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#softShadow)"/>
        <rect x="80" y="188" width="150" height="24" rx="12" fill="#2563eb" opacity="0.1"/>
        <text x="155" y="205" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">2 · Transcribe</text>
        <text x="460" y="205" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Audio → transcript via Granola, Plaud, or Otter</text>

        <!-- Flow: Transcribe to AI -->
        <line x1="600" y1="225" x2="600" y2="260" stroke="#2563eb" stroke-width="2" class="flow-line"/>

        <!-- Step 3: AI Analyse -->
        <rect x="370" y="260" width="460" height="70" rx="10" fill="url(#aiGrad)" filter="url(#softShadow)"/>
        <rect x="80" y="278" width="200" height="24" rx="12" fill="#2563eb" opacity="0.1"/>
        <text x="180" y="295" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">3 · AI analyses with rules</text>
        <text x="400" y="290" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">AI reads transcript against department rules</text>
        <text x="400" y="312" fill="#bfdbfe" font-family="system-ui, -apple-system, sans-serif" font-size="11">"Extract action items for Operations" · "Flag any H&S incidents" · "List Ski School changes"</text>

        <!-- Flow: AI to Route -->
        <line x1="600" y1="330" x2="600" y2="365" stroke="#2563eb" stroke-width="2" class="flow-line"/>

        <!-- Step 4: Route -->
        <rect x="430" y="365" width="340" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" filter="url(#softShadow)"/>
        <rect x="80" y="378" width="200" height="24" rx="12" fill="#2563eb" opacity="0.1"/>
        <text x="180" y="395" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">4 · Route to channels</text>
        <text x="460" y="395" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Each summary pushed to the right channel automatically</text>

        <!-- ============ FLOW LINES: Route to Departments ============ -->

        <!-- Line to Ops -->
        <line x1="500" y1="415" x2="500" y2="455" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="500" y1="455" x2="165" y2="455" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="165" y1="455" x2="165" y2="500" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>

        <!-- Line to Ski School -->
        <line x1="545" y1="415" x2="545" y2="470" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="545" y1="470" x2="420" y2="470" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="420" y1="470" x2="420" y2="500" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>

        <!-- Line to Maintenance -->
        <line x1="655" y1="415" x2="655" y2="470" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="655" y1="470" x2="780" y2="470" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="780" y1="470" x2="780" y2="500" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>

        <!-- Line to H&S -->
        <line x1="700" y1="415" x2="700" y2="455" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="700" y1="455" x2="1035" y2="455" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>
        <line x1="1035" y1="455" x2="1035" y2="500" stroke="#1e3a5f" stroke-width="1.5" class="flow-line"/>

        <!-- ============ DEPARTMENT CARDS ============ -->

        <!-- OPS -->
        <rect x="60" y="500" width="210" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="60" y="500" width="210" height="36" rx="10" fill="url(#opsGrad)"/>
        <rect x="60" y="520" width="210" height="16" fill="url(#opsGrad)"/>
        <text x="165" y="524" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Operations</text>
        <text x="80" y="558" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ Staffing changes for Saturday</text>
        <text x="80" y="576" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ Lift 4 opening delay confirmed</text>
        <text x="80" y="594" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ Car park overflow plan approved</text>
        <rect x="78" y="610" width="65" height="20" rx="10" fill="#dbeafe"/>
        <text x="110" y="624" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Teams</text>

        <!-- SKI SCHOOL -->
        <rect x="315" y="500" width="210" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="315" y="500" width="210" height="36" rx="10" fill="url(#skiGrad)"/>
        <rect x="315" y="520" width="210" height="16" fill="url(#skiGrad)"/>
        <text x="420" y="524" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Ski School</text>
        <text x="335" y="558" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ Beginner area moved to T-bar</text>
        <text x="335" y="576" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ Group lesson ratio change: 1:6</text>
        <text x="335" y="594" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">→ New instructor starts Monday</text>
        <rect x="333" y="610" width="80" height="20" rx="10" fill="#dbeafe"/>
        <text x="373" y="624" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Telegram</text>

        <!-- MAINTENANCE -->
        <rect x="675" y="500" width="210" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="675" y="500" width="210" height="36" rx="10" fill="url(#maintGrad)"/>
        <rect x="675" y="520" width="210" height="16" fill="url(#maintGrad)"/>
        <text x="780" y="524" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Maintenance</text>
        <text x="695" y="558" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">☐ Fix handrail at base building</text>
        <text x="695" y="576" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">☐ Snow gun #3 pressure check</text>
        <text x="695" y="594" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">☐ Cafe extraction fan — parts ETA?</text>
        <rect x="693" y="610" width="55" height="20" rx="10" fill="#dbeafe"/>
        <text x="720" y="624" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Email</text>

        <!-- H&S -->
        <rect x="930" y="500" width="210" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>
        <rect x="930" y="500" width="210" height="36" rx="10" fill="url(#hsGrad)"/>
        <rect x="930" y="520" width="210" height="16" fill="url(#hsGrad)"/>
        <text x="1035" y="524" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Health & Safety</text>
        <text x="950" y="558" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">⚠ Ice on access road — grit by 6am</text>
        <text x="950" y="576" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">⚠ Incident report: guest fall T-bar</text>
        <text x="950" y="594" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11">⚠ Avalanche risk review Wednesday</text>
        <rect x="948" y="610" width="82" height="20" rx="10" fill="#dbeafe"/>
        <text x="989" y="624" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Dashboard</text>

        <!-- ============ WHAT THIS ACTUALLY TAKES ============ -->
        <line x1="60" y1="690" x2="1140" y2="690" stroke="#e2e8f0" stroke-width="1"/>
        <text x="600" y="720" text-anchor="middle" fill="#0f2440" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">What this takes</text>

        <!-- 4 small cards in a row -->
        <rect x="60" y="740" width="250" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="185" y="764" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Transcribe</text>

        <rect x="340" y="740" width="250" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="465" y="764" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Logic Per Department</text>

        <rect x="620" y="740" width="250" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="745" y="764" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">AI Automation Routing</text>

        <rect x="900" y="740" width="250" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="1025" y="764" text-anchor="middle" fill="#2563eb" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Channel Integration</text>

        <!-- Bottom tagline -->
        <text x="600" y="835" text-anchor="middle" fill="#0f2440" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">One 90-minute meeting → four tailored briefs in under 2 minutes</text>
        <text x="600" y="858" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">No one sits through the full recap to find the two things that matter to them.</text>

    </svg>

    <script>
    function exportDiagram() {
        const svg = document.getElementById('visualization');
        const format = document.getElementById('format').value;
        const scale = parseInt(document.getElementById('scale').value);
        if (format === 'svg') {
            const blob = new Blob([svg.outerHTML], {type: 'image/svg+xml'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'meeting-intelligence-flow.svg'; a.click();
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = svg.viewBox.baseVal.width * scale;
        canvas.height = svg.viewBox.baseVal.height * scale;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const a = document.createElement('a'); a.href = canvas.toDataURL('image/' + format, 0.95);
            a.download = 'meeting-intelligence-flow.' + format; a.click(); };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg.outerHTML)));
    }
    </script>
</body>
</html>
